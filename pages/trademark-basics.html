<h1>Trademark Basics</h1>

<p>
A trademark is a word, name, symbol, or design used to identify the source of goods or services.
</p>

<h2>What Can Be a Trademark</h2>

<ul>
<li>Brand name</li>
<li>Logo</li>
<li>Slogan</li>
<li>Symbol</li>
<li>Distinctive packaging</li>
</ul>

<h2>Trademark Symbols</h2>

<ul>
<li>™ claimed trademark</li>
<li>® registered trademark</li>
</ul>
